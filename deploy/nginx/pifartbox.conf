server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /opt/piFartBox/web;
  index index.html;

  location /api/ {
    proxy_pass http://127.0.0.1:17890/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api/runtime-status.json {
    alias /var/lib/piFartBox/runtime-status.json;
    default_type application/json;
  }

  location = /api/runtime-status.txt {
    alias /var/lib/piFartBox/runtime-status.txt;
    default_type text/plain;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
